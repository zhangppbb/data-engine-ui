map $http_origin $cors_origin {
 default "";
    "~^https://qccdata.qichacha.com$" $http_origin;
    "~^https://api.map.baidu.com$" $http_origin;
    "~^https://dlswbr.baidu.com$" $http_origin;
    "~^https://miao.baidu.com$" $http_origin;
    "~^http://116.204.81.140$" $http_origin;
    "~^https://pro-plugin.qcc.com$" $http_origin;
    "~^http://dlswbr.baidu.com$" $http_origin;
    "~^http://api.map.baidu.com$" $http_origin;
    "~^https://libs.baidu.com$" $http_origin;
    "~^http://libs.baidu.com$" $http_origin;
    "~^https://code.hcharts.cn$" $http_origin;
}

server {
    listen       86;
    server_name  http://116.204.81.140;

    #设置请求最大限制
    client_max_body_size 100M;

       #开启gzip
   gzip  on;
   #低于1kb的资源不压缩
   gzip_min_length 1k;
   #压缩级别【1-9】，越大压缩率越高，同时消耗cpu资源也越多，建议设置在4左右。
   gzip_comp_level 4;
   #需要压缩哪些响应类型的资源，多个空格隔开。不建议压缩图片，下面会讲为什么。
   gzip_types text/plain application/javascript application/x-javascript text/javascript text/xml text/css;
   #配置禁用gzip条件，支持正则。此处表示ie6及以下不启用gzip（因为ie低版本不支持）
   gzip_disable "MSIE [1-6]\.";
   #是否添加“Vary: Accept-Encoding”响应头
   gzip_vary on;

    #charset koi8-r;
    #access_log  /var/log/nginx/host.access.log  main;

    location / {
            root   /usr/share/nginx/html/northwest;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header 'Access-Control-Allow-Origin' $cors_origin;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range';
            if ($request_method = 'OPTIONS') {
              add_header 'Access-Control-Max-Age' 1728000;
              add_header 'Content-Type' 'text/plain; charset=utf-8';
              add_header 'Content-Length' 0;
              return 204;
            }
            add_header X-Frame-Options "ALLOW-FROM https://api.map.baidu.com";
            add_header X-Download-Options "noopen";
            add_header Content-Security-Policy "frame-ancestors 'self' https://api.map.baidu.com";
            add_header Strict-Transport-Security 'max-age=15552000';
            add_header X-Permitted-Cross-Domain-Policies 'by-content-type';
            add_header Referrer-Policy "no-referrer";
            add_header X-XSS-Protection '1;mode=block';
            add_header X-Content-Type-Options 'nosniff';
            add_header Set-Cookie "Path=/; HttpOnly; Secure";
        }

    location ^~/mind-map/ {
        root   /usr/share/nginx/html/northwest;
        index  mind-map.html mind-map.htm;
        try_files $uri $uri/ /mind-map.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

    }

    location ^~/northwest-api/ {
                  proxy_set_header  Host             $host;
                  proxy_set_header  X-Real-IP        $remote_addr;
                  proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
                  proxy_set_header  X-NginX-Proxy    true;
                  proxy_pass        http://192.168.0.78:8100/;


                  add_header 'Access-Control-Allow-Origin' $cors_origin;
                  add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE';
                  add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
                  add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range';
                  if ($request_method = 'OPTIONS') {
                       add_header 'Access-Control-Max-Age' 1728000;
                       add_header 'Content-Type' 'text/plain; charset=utf-8';
                       add_header 'Content-Length' 0;
                       return 204;
                  }
                  add_header X-Download-Options "noopen";
                  add_header Strict-Transport-Security 'max-age=15552000';
                  add_header X-Permitted-Cross-Domain-Policies 'by-content-type';
                  add_header Referrer-Policy "no-referrer";
                  add_header X-XSS-Protection '1;mode=block';
                  add_header X-Content-Type-Options 'nosniff';
                  add_header Set-Cookie "Path=/; HttpOnly; Secure";
          }

    #error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # proxy the PHP scripts to Apache listening on 127.0.0.1:80
    #
    #location ~ \.php$ {
    #    proxy_pass   http://127.0.0.1;
    #}

    # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
    #
    #location ~ \.php$ {
    #    root           html;
    #    fastcgi_pass   127.0.0.1:9000;
    #    fastcgi_index  index.php;
    #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
    #    include        fastcgi_params;
    #}

    # deny access to .htaccess files, if Apache's document root
    # concurs with nginx's one
    #
    #location ~ /\.ht {
    #    deny  all;
    #}
}

server {
    listen 8002;
    server_name 116.204.81.140;
    proxy_http_version 1.1;
    location / {
        resolver 8.8.8.8;
        proxy_pass https://pro-plugin.qcc.com; #企查查专业版插件地址
        proxy_buffering off;


        add_header 'Access-Control-Allow-Origin' $cors_origin;
        add_header 'Access-Control-Allow-Methods' 'GET, POST';
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range';
        if ($request_method = 'OPTIONS') {
             add_header 'Access-Control-Max-Age' 1728000;
             add_header 'Content-Type' 'text/plain; charset=utf-8';
             add_header 'Content-Length' 0;
             return 204;
        }
        add_header X-Frame-Options "ALLOW-FROM https://pro-plugin.qcc.com";
        add_header X-Download-Options "noopen";
        add_header Content-Security-Policy "script-src * 'unsafe-inline' 'unsafe-eval'";
        add_header Strict-Transport-Security 'max-age=15552000';
        add_header X-Permitted-Cross-Domain-Policies 'by-content-type';
        add_header Referrer-Policy "no-referrer";
        add_header X-XSS-Protection '1;mode=block';
        add_header X-Content-Type-Options 'nosniff';
        add_header Set-Cookie "Path=/; HttpOnly; Secure";
    }
}
